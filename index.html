<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Pop Splash</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <button class="star-button" id="starButton" aria-label="Pop the star">
      <svg viewBox="0 0 120 120" class="star-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
        <polygon points="60,10 73,45 110,45 80,70 90,110 60,85 30,110 40,70 10,45 47,45" />
      </svg>
    </button>
    <div class="effect-container" id="effectContainer"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
